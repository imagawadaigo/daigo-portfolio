title: 今川大悟 | Web制作・LINE Bot・システム開発
description: LP・店舗サイトの制作から、LINE Bot構築・業務自動化・SaaSプロトタイプ開発まで一貫して対応。自社プロダクトの本番運用実績あり。
url: https://imagawadaigo.github.io
baseurl: /daigo-portfolio
author: 今川大悟
lang: ja-JP

permalink: /:basename.html

include:
  - robots.txt
  - .well-known

exclude:
  - README.md
  - CLAUDE.md
  - .claude
  - .git
  - .github
  - .gitignore
  - .DS_Store
  - Thumbs.db
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - "*.bak"
  - "*.old"
  - "*.log"
  - "*.env"
  - ".env*"
  - "*.key"
  - "*.pem"
  - "private/"
  - "draft/"
  - "drafts/"

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# jekyll-seo-tag defaults
logo: /assets/img/ogp.png
twitter:
  card: summary_large_image
social:
  name: 今川大悟
  links:
    - https://github.com/imagawadaigo

defaults:
  - scope:
      path: ""
    values:
      layout: default
      image: /assets/img/ogp.png
  - scope:
      path: "izakaya-lp.html"
    values:
      sitemap: false
  - scope:
      path: "bakery-cafe.html"
    values:
      sitemap: false
  - scope:
      path: "salon-lp.html"
    values:
      sitemap: false
  - scope:
      path: "construction.html"
    values:
      sitemap: false

sass:
  style: compressed
