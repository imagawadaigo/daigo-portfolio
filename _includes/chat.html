<!-- ── AI Chat Widget ── -->
<div id="chat-widget" aria-label="AIチャット相談" role="complementary">

  <!-- Chat panel (hidden by default via CSS class) -->
  <div id="chat-panel" role="dialog" aria-modal="false" aria-label="AI相談チャット">
    <div class="chat-header">
      <div class="chat-header__info">
        <span class="chat-header__dot" aria-hidden="true"></span>
        <span class="chat-header__title">AI相談</span>
      </div>
      <button id="chat-close" class="chat-close-btn" aria-label="閉じる">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div id="chat-messages" class="chat-messages" aria-live="polite" aria-relevant="additions">
      <div class="chat-msg chat-msg--bot">
        <p>サービス・料金・制作の流れについてお気軽にどうぞ。</p>
      </div>
    </div>

    <form id="chat-form" class="chat-input-area" autocomplete="off">
      <input
        id="chat-input"
        class="chat-input"
        type="text"
        placeholder="質問を入力…"
        maxlength="400"
        autocomplete="off"
        spellcheck="false"
        aria-label="メッセージを入力"
        required
      >
      <button type="submit" class="chat-send" aria-label="送信">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </form>
  </div>

  <!-- Toggle button (pill shape) -->
  <button id="chat-toggle" aria-expanded="false" aria-controls="chat-panel" aria-label="AIに相談する">
    <svg id="chat-icon-open" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <span id="chat-toggle-label">相談</span>
    <svg id="chat-icon-close" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true" style="display:none;">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
</div>

<style>
/* ── Chat widget container ── */
#chat-widget {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 12px;
}

/* ── Toggle button (pill) ── */
#chat-toggle {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  height: 44px;
  padding: 0 18px 0 14px;
  border-radius: 999px;
  background: var(--accent);
  color: #fff;
  border: none;
  cursor: pointer;
  font-family: var(--font-sans);
  font-size: 0.875rem;
  font-weight: 600;
  letter-spacing: 0.01em;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.24);
  transition: transform 0.18s, background 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}
#chat-toggle:hover { background: var(--accent-hover); transform: translateY(-1px); }
#chat-toggle:active { transform: scale(0.97); }

/* ── Chat panel (hidden by default) ── */
#chat-panel {
  display: none; /* controlled via .is-open class */
  flex-direction: column;
  width: 320px;
  background: var(--bg-card);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  max-height: calc(100dvh - 100px);
  animation: chat-in 0.22s ease;
}
#chat-panel.is-open { display: flex; }
@keyframes chat-in {
  from { opacity: 0; transform: translateY(10px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── Header ── */
.chat-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
  background: var(--bg);
  flex-shrink: 0;
}
.chat-header__info { display: flex; align-items: center; gap: 8px; }
.chat-header__dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #22c55e;
  box-shadow: 0 0 0 2px rgba(34,197,94,0.25);
}
.chat-header__title { font-weight: 700; font-size: 0.9rem; color: var(--text); }
.chat-close-btn {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  background: transparent; border: none; cursor: pointer;
  color: var(--text-muted);
  border-radius: var(--radius-sm);
  transition: background 0.15s;
}
.chat-close-btn:hover { background: var(--bg-elev); color: var(--text); }

/* ── Messages ── */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 180px;
  max-height: 300px;
  scroll-behavior: smooth;
}
.chat-msg { max-width: 90%; }
.chat-msg--bot  { align-self: flex-start; }
.chat-msg--user { align-self: flex-end; }
.chat-msg p, .chat-msg span {
  display: block;
  padding: 9px 12px;
  border-radius: 12px;
  font-size: 0.8125rem;
  line-height: 1.65;
  margin: 0;
  word-break: break-word;
}
.chat-msg--bot p, .chat-msg--bot span {
  background: var(--bg-elev);
  color: var(--text);
  border-radius: 4px 12px 12px 12px;
}
.chat-msg--user p, .chat-msg--user span {
  background: var(--accent);
  color: #fff;
  border-radius: 12px 4px 12px 12px;
}
.chat-msg--typing span { color: var(--text-subtle); font-style: italic; }

/* ── Input area ── */
.chat-input-area {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  border-top: 1px solid var(--line);
  background: var(--bg);
  flex-shrink: 0;
}
.chat-input {
  flex: 1;
  padding: 8px 11px;
  font-size: 0.8125rem;
  font-family: var(--font-sans);
  background: var(--bg-card);
  color: var(--text);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius);
  min-width: 0;
  transition: border-color 0.15s;
}
.chat-input:focus { outline: none; border-color: var(--accent); }
.chat-send {
  width: 34px; height: 34px;
  border-radius: var(--radius-sm);
  background: var(--accent); color: #fff;
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s, transform 0.1s;
}
.chat-send:hover { background: var(--accent-hover); }
.chat-send:active { transform: scale(0.93); }
.chat-send:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── In-chat contact link ── */
.chat-contact-link {
  display: inline-block;
  margin-top: 8px;
  padding: 6px 12px;
  background: var(--accent);
  color: #fff;
  font-size: 0.8rem;
  font-weight: 600;
  border-radius: 999px;
  text-decoration: none;
  transition: background 0.15s;
}
.chat-contact-link:hover { background: var(--accent-hover); }

/* ── Mobile ── */
@media (max-width: 400px) {
  #chat-widget { bottom: 16px; right: 16px; }
  #chat-panel { width: calc(100vw - 32px); }
}
</style>

<script src="{{ '/assets/js/chat.js' | relative_url }}" defer></script>
